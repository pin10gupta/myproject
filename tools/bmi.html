<!DOCTYPE html>
<html>
<head>
<title>BMI Calculator</title>
<link rel="stylesheet" href="../css/style.css">
 <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-VLDEWMCRJW"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-VLDEWMCRJW');
</script>
</head>

<body>

<header>
<h1>BMI Calculator</h1>
<a href="../index.html">Home</a>
</header>

<main>
<input id="weight" placeholder="Weight kg"><br><br>
<input id="height" placeholder="Height m"><br><br>

<button onclick="calc()">Calculate</button>
<p id="res"></p>
</main>

<script>
function calc(){
 let w = document.getElementById("weight").value;
 let h = document.getElementById("height").value;
 let bmi = w/(h*h);
 document.getElementById("res").innerText = "BMI: " + bmi.toFixed(2);
}
</script>

</body>
</html>
