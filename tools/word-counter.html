<!DOCTYPE html>
<html>
<head>
  <title>Word Counter</title>
  <link rel="stylesheet" href="../css/style.css">
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-VLDEWMCRJW"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-VLDEWMCRJW');
</script>
</head>

<body>

<header>
<h1>Word Counter</h1>
<a href="../index.html">Home</a>
</header>

<main>
<textarea id="text" rows="10" cols="40"></textarea>
<br><br>
<button onclick="countWords()">Count</button>

<p id="result"></p>
</main>

<script>
function countWords() {
  let text = document.getElementById("text").value;
  let words = text.trim().split(/\s+/).length;
  document.getElementById("result").innerText = "Words: " + words;
}
</script>

</body>
</html>
